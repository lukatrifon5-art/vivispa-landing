<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Administrare — ViviSpa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<style>
  body { background: var(--cream); min-height: 100vh; }
  .admin-wrap { max-width: 640px; margin: 0 auto; padding: 80px 24px 60px; }
  .admin-card { background: var(--warm-beige); border-radius: var(--radius); padding: 40px; }
  .admin-card h1 { font-family: 'Fraunces', serif; font-size: 1.8rem; margin-bottom: 8px; }
  .admin-card .lead { color: var(--charcoal-soft); font-size: 0.95rem; margin-bottom: 28px; }
  .admin-field { margin-bottom: 18px; }
  .admin-field label { display: block; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--charcoal-soft); margin-bottom: 8px; }
  .admin-field input { width: 100%; padding: 13px 16px; border: 1px solid rgba(46,42,36,0.16); border-radius: 10px; background: var(--white); font-family: 'Jost', sans-serif; font-size: 0.95rem; }
  .admin-field input:focus { outline: none; border-color: var(--gold); }
  .admin-btn { display: inline-block; padding: 13px 26px; border-radius: 999px; background: var(--charcoal); color: var(--cream); border: none; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 0.9rem; letter-spacing: 0.02em; }
  .admin-btn:hover { background: var(--gold); }
  .admin-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .admin-msg { margin-top: 14px; font-size: 0.88rem; min-height: 1.2em; }
  .admin-msg.error { color: #b0574f; }
  .admin-msg.success { color: var(--sage); }
  #adminPanel { display: none; }

  /* Calendar */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .cal-header h2 { font-family: 'Fraunces', serif; font-size: 1.3rem; text-transform: capitalize; }
  .cal-nav { display: flex; gap: 8px; }
  .cal-nav button {
    width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(46,42,36,0.16);
    background: var(--white); cursor: pointer; font-size: 1.1rem; color: var(--charcoal);
    display: flex; align-items: center; justify-content: center;
  }
  .cal-nav button:hover { background: var(--gold); color: var(--white); border-color: var(--gold); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-weekday { text-align: center; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--charcoal-soft); padding-bottom: 6px; }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 10px; font-size: 0.92rem; cursor: pointer;
    background: var(--white); border: 1px solid transparent; color: var(--charcoal);
    transition: background .2s ease, color .2s ease;
  }
  .cal-day:hover:not(.cal-day--empty):not(.cal-day--past) { background: rgba(176,141,87,0.18); }
  .cal-day--empty { visibility: hidden; cursor: default; }
  .cal-day--past { color: rgba(46,42,36,0.28); cursor: not-allowed; background: transparent; }
  .cal-day--today { border-color: var(--gold); font-weight: 600; }
  .cal-day--closed { background: #b0574f; color: var(--white); }
  .cal-day--closed:hover { background: #9a4a44; }
  .cal-day--saving { opacity: 0.5; pointer-events: none; }
  .cal-legend { display: flex; align-items: center; gap: 8px; margin-top: 18px; font-size: 0.82rem; color: var(--charcoal-soft); }
  .cal-legend-dot { width: 12px; height: 12px; border-radius: 4px; background: #b0574f; display: inline-block; }
</style>
</head>
<body>

<div class="admin-wrap">
  <div class="admin-card">
    <a href="index.html" class="logo" style="display:block;margin-bottom:26px;">Vivi<span>Spa</span></a>

    <div id="loginPanel">
      <h1>Administrare rezervări</h1>
      <p class="lead">Introdu parola pentru a gestiona zilele nelucrătoare.</p>
      <div class="admin-field">
        <label for="admin-password">Parolă</label>
        <input type="password" id="admin-password" placeholder="Parola de administrare">
      </div>
      <button class="admin-btn" id="loginBtn">Intră</button>
      <p class="admin-msg" id="loginMsg"></p>
    </div>

    <div id="adminPanel">
      <h1>Zile nelucrătoare</h1>
      <p class="lead">Apasă pe o zi ca să o marchezi liberă (roșu) sau lucrătoare din nou. Clienții nu vor putea rezerva în zilele marcate roșu.</p>

      <div class="cal-header">
        <div class="cal-nav">
          <button id="prevMonth" aria-label="Luna anterioară">‹</button>
          <button id="nextMonth" aria-label="Luna următoare">›</button>
        </div>
        <h2 id="calTitle"></h2>
        <span style="width:38px;"></span>
      </div>
      <div class="cal-grid" id="calGrid"></div>

      <div class="cal-legend"><span class="cal-legend-dot"></span> Zi liberă (nelucrătoare)</div>

      <p class="admin-msg" id="adminMsg"></p>
    </div>
  </div>
</div>

<script>
  const loginPanel = document.getElementById('loginPanel');
  const adminPanel = document.getElementById('adminPanel');
  const passwordInput = document.getElementById('admin-password');
  const loginBtn = document.getElementById('loginBtn');
  const loginMsg = document.getElementById('loginMsg');
  const adminMsg = document.getElementById('adminMsg');
  const calTitle = document.getElementById('calTitle');
  const calGrid = document.getElementById('calGrid');
  const prevMonthBtn = document.getElementById('prevMonth');
  const nextMonthBtn = document.getElementById('nextMonth');

  let sessionPassword = sessionStorage.getItem('vivispa-admin-pass') || '';
  let closedDates = [];
  const todayISO = new Date().toISOString().split('T')[0];
  const today = new Date();
  let viewYear = today.getFullYear();
  let viewMonth = today.getMonth(); // 0-indexed

  const WEEKDAYS = ['L', 'Ma', 'Mi', 'J', 'V', 'S', 'D'];
  const toISO = (y, m, d) => `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

  const renderCalendar = () => {
    const monthDate = new Date(viewYear, viewMonth, 1);
    calTitle.textContent = monthDate.toLocaleDateString('ro-RO', { month: 'long', year: 'numeric' });

    calGrid.innerHTML = '';
    WEEKDAYS.forEach((w) => {
      const el = document.createElement('div');
      el.className = 'cal-weekday';
      el.textContent = w;
      calGrid.appendChild(el);
    });

    const firstDay = new Date(viewYear, viewMonth, 1);
    // getDay(): 0=Sun..6=Sat -> convert to Monday-first index (0=Mon..6=Sun)
    const leadingEmpty = (firstDay.getDay() + 6) % 7;
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

    for (let i = 0; i < leadingEmpty; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day cal-day--empty';
      calGrid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const iso = toISO(viewYear, viewMonth, d);
      const el = document.createElement('div');
      el.className = 'cal-day';
      el.textContent = d;
      el.dataset.date = iso;
      if (iso === todayISO) el.classList.add('cal-day--today');
      if (iso < todayISO) {
        el.classList.add('cal-day--past');
      } else {
        el.addEventListener('click', () => toggleDate(iso, el));
      }
      if (closedDates.includes(iso)) el.classList.add('cal-day--closed');
      calGrid.appendChild(el);
    }
  };

  const toggleDate = async (iso, el) => {
    const isClosed = closedDates.includes(iso);
    const action = isClosed ? 'remove' : 'add';
    el.classList.add('cal-day--saving');
    adminMsg.textContent = 'Se salvează...';
    adminMsg.className = 'admin-msg';
    try {
      const res = await fetch('/api/admin-update-dates', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: sessionPassword, action, date: iso }),
      });
      const result = await res.json();
      if (!res.ok) throw new Error(result.error || 'Eroare necunoscută');
      closedDates = result.dates || [];
      renderCalendar();
      adminMsg.textContent = 'Salvat. Poate dura circa un minut până apare live pe site.';
      adminMsg.classList.add('success');
    } catch (err) {
      adminMsg.textContent = err.message;
      adminMsg.classList.add('error');
      el.classList.remove('cal-day--saving');
    }
  };

  const loadDates = async () => {
    const res = await fetch('/api/closed-dates');
    const data = await res.json();
    closedDates = data.dates || [];
    renderCalendar();
  };

  prevMonthBtn.addEventListener('click', () => {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  });
  nextMonthBtn.addEventListener('click', () => {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  });

  const tryLogin = async () => {
    const pass = passwordInput.value;
    if (!pass) return;
    loginMsg.textContent = 'Se verifică...';
    loginMsg.className = 'admin-msg';
    // Validate by attempting a harmless "remove" of a bogus date; a wrong password returns 401
    const res = await fetch('/api/admin-update-dates', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass, action: 'remove', date: '1999-01-01' }),
    });
    if (res.status === 401) {
      loginMsg.textContent = 'Parolă incorectă.';
      loginMsg.classList.add('error');
      return;
    }
    sessionPassword = pass;
    sessionStorage.setItem('vivispa-admin-pass', pass);
    loginPanel.style.display = 'none';
    adminPanel.style.display = 'block';
    loadDates();
  };

  loginBtn.addEventListener('click', tryLogin);
  passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });

  if (sessionPassword) {
    fetch('/api/admin-update-dates', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: sessionPassword, action: 'remove', date: '1999-01-01' }),
    }).then((res) => {
      if (res.status !== 401) {
        loginPanel.style.display = 'none';
        adminPanel.style.display = 'block';
        loadDates();
      }
    });
  }
</script>

</body>
</html>
